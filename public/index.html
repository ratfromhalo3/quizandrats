<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Questions JSON Editor</title>
  <link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700&display=swap" rel="stylesheet">
  <style>
    :root, [data-theme="light"] {
      --text-xs: clamp(0.75rem, 0.7rem + 0.25vw, 0.875rem);
      --text-sm: clamp(0.875rem, 0.8rem + 0.35vw, 1rem);
      --text-base: clamp(1rem, 0.95rem + 0.25vw, 1.125rem);
      --text-lg: clamp(1.125rem, 1rem + 0.75vw, 1.5rem);
      --text-xl: clamp(1.5rem, 1.2rem + 1.25vw, 2rem);
      --space-1: 0.25rem; --space-2: 0.5rem; --space-3: 0.75rem; --space-4: 1rem; --space-5: 1.25rem; --space-6: 1.5rem; --space-8: 2rem; --space-10: 2.5rem;
      --color-bg: #f7f6f2; --color-surface: #f9f8f5; --color-surface-2: #fbfbf9; --color-surface-offset: #f3f0ec; --color-border: #d4d1ca; --color-divider: #dcd9d5;
      --color-text: #28251d; --color-text-muted: #6c6a65; --color-text-faint: #9d9a93; --color-text-inverse: #f9f8f4;
      --color-primary: #01696f; --color-primary-hover: #0c4e54; --color-primary-highlight: #cedcd8; --color-success: #437a22; --color-error: #a12c7b;
      --radius-sm: 0.375rem; --radius-md: 0.5rem; --radius-lg: 0.75rem; --radius-xl: 1rem; --shadow-sm: 0 1px 2px rgb(0 0 0 / 0.06); --shadow-md: 0 10px 30px rgb(0 0 0 / 0.08);
      --font-body: 'Satoshi', Arial, sans-serif;
    }
    [data-theme="dark"] {
      --color-bg: #171614; --color-surface: #1c1b19; --color-surface-2: #201f1d; --color-surface-offset: #1d1c1a; --color-border: #393836; --color-divider: #262523;
      --color-text: #cdccca; --color-text-muted: #a19f9a; --color-text-faint: #787672; --color-text-inverse: #2b2a28;
      --color-primary: #4f98a3; --color-primary-hover: #227f8b; --color-primary-highlight: #313b3b; --color-success: #6daa45; --color-error: #d163a7;
      --shadow-sm: 0 1px 2px rgb(0 0 0 / 0.2); --shadow-md: 0 10px 30px rgb(0 0 0 / 0.25);
    }
    *,*::before,*::after { box-sizing: border-box; }
    html,body { margin:0; height:100%; overflow:hidden; }
    body { font-family: var(--font-body); font-size: var(--text-base); background: var(--color-bg); color: var(--color-text); }
    button,input,textarea,select { font: inherit; color: inherit; }
    button { cursor: pointer; }
    .app { display:grid; grid-template-columns: minmax(320px, 420px) 1fr; grid-template-rows: auto 1fr; height:100dvh; }
    .sidebar { grid-row:1 / -1; background: var(--color-surface); border-right:1px solid var(--color-border); overflow:auto; }
    .header { display:flex; justify-content:space-between; align-items:center; gap:var(--space-4); padding:var(--space-4) var(--space-6); border-bottom:1px solid var(--color-border); background: color-mix(in srgb, var(--color-surface) 92%, transparent); backdrop-filter: blur(12px); position:sticky; top:0; z-index:5; }
    .main { overflow:auto; }
    .brand { display:flex; align-items:center; gap:var(--space-3); }
    .logo { width:32px; height:32px; color: var(--color-primary); }
    .title { font-size: var(--text-xl); line-height:1.15; font-weight:700; }
    .muted { color: var(--color-text-muted); }
    .sidebar-top,.form-shell { padding: var(--space-5); }
    .sidebar-top { position:sticky; top:0; background: var(--color-surface); border-bottom:1px solid var(--color-border); z-index:3; }
    .stack { display:grid; gap: var(--space-4); }
    .toolbar { display:flex; gap: var(--space-3); flex-wrap:wrap; }
    .input,.textarea,.select { width:100%; background: var(--color-surface-2); border:1px solid var(--color-border); border-radius: var(--radius-md); padding: 0.8rem 0.95rem; }
    .textarea { min-height: 120px; resize: vertical; }
    .btn { border:1px solid transparent; border-radius: var(--radius-md); padding: 0.8rem 1rem; background: var(--color-surface-offset); }
    .btn:hover { filter: brightness(0.99); }
    .btn-primary { background: var(--color-primary); color: var(--color-text-inverse); }
    .btn-primary:hover { background: var(--color-primary-hover); }
    .btn-ghost { background: transparent; border-color: var(--color-border); }
    .btn-danger { background: color-mix(in srgb, var(--color-error) 14%, var(--color-surface)); color: var(--color-error); border-color: color-mix(in srgb, var(--color-error) 30%, var(--color-border)); }
    .pill { display:inline-flex; align-items:center; gap:0.4rem; font-size: var(--text-xs); background: var(--color-primary-highlight); color: var(--color-primary); padding:0.4rem 0.7rem; border-radius:999px; }
    .list { padding: var(--space-3); display:grid; gap: var(--space-3); }
    .item { width:100%; text-align:left; border:1px solid var(--color-border); background: var(--color-surface-2); border-radius: var(--radius-lg); padding: var(--space-4); box-shadow: var(--shadow-sm); }
    .item.active { border-color: var(--color-primary); background: color-mix(in srgb, var(--color-primary-highlight) 60%, var(--color-surface-2)); }
    .item h3 { margin:0 0 0.35rem; font-size: var(--text-sm); }
    .item p { margin:0; font-size: var(--text-xs); color: var(--color-text-muted); }
    .item-meta { display:flex; justify-content:space-between; align-items:center; gap:var(--space-3); margin-top: var(--space-3); }
    .card { background: var(--color-surface); border:1px solid var(--color-border); border-radius: var(--radius-xl); padding: var(--space-5); box-shadow: var(--shadow-sm); }
    .grid-2 { display:grid; grid-template-columns: 1fr 1fr; gap: var(--space-4); }
    .field { display:grid; gap: var(--space-2); }
    .field label { font-size: var(--text-sm); font-weight:600; }
    .answers { display:grid; gap: var(--space-3); }
    .answer-row { display:grid; grid-template-columns: 1fr auto; gap: var(--space-3); align-items:center; }
    .status { min-height: 1.5rem; font-size: var(--text-sm); }
    .status.error { color: var(--color-error); }
    .status.success { color: var(--color-success); }
    .stats { display:flex; gap: var(--space-3); flex-wrap:wrap; }
    .stat { padding: var(--space-3) var(--space-4); border:1px solid var(--color-border); background: var(--color-surface-2); border-radius: var(--radius-lg); }
    .tiny { font-size: var(--text-xs); color: var(--color-text-muted); }
    .empty { padding: var(--space-8); text-align:center; color: var(--color-text-muted); }
    .hidden { display:none !important; }
    @media (max-width: 960px) {
      html,body { overflow:auto; }
      .app { grid-template-columns: 1fr; grid-template-rows: auto auto 1fr; height:auto; }
      .sidebar { grid-row:auto; border-right:none; border-bottom:1px solid var(--color-border); max-height: 45vh; }
      .header { position:static; }
      .grid-2 { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="sidebar-top stack">
        <div class="brand">
          <svg class="logo" viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="4" aria-label="Questions editor logo">
            <rect x="10" y="10" width="44" height="44" rx="12"></rect>
            <path d="M22 25h20M22 33h20M22 41h12"></path>
          </svg>
          <div>
            <div style="font-weight:700;">Questions Editor</div>
            <div class="tiny">Edit questions.json from the browser</div>
          </div>
        </div>
        <div class="stats">
          <div class="stat"><div class="tiny">Entries</div><div id="entryCount">0</div></div>
          <div class="stat"><div class="tiny">Categories</div><div id="categoryCount">0</div></div>
        </div>
        <input id="searchInput" class="input" type="search" placeholder="Search questions or categories" />
        <select id="categoryFilter" class="select">
          <option value="">All categories</option>
        </select>
        <div class="toolbar">
          <button id="newButton" class="btn btn-primary">Add question</button>
          <button id="downloadButton" class="btn btn-ghost" type="button">Download JSON</button>
          <button id="themeToggle" class="btn btn-ghost" type="button">Toggle theme</button>
        </div>
      </div>
      <div id="list" class="list"></div>
    </aside>

    <header class="header">
      <div>
        <div class="title">JSON CRUD editor</div>
        <div class="muted">Create, update, and delete records stored in the server file.</div>
      </div>
      <span class="pill" id="dataFilePill">Data file: loading...</span>
    </header>

    <main class="main">
      <div class="form-shell stack">
        <div class="card stack">
          <div>
            <div class="title" style="font-size: var(--text-lg);" id="formTitle">Select a question</div>
            <div class="muted">Edits save back to the server-side JSON file.</div>
          </div>
          <form id="questionForm" class="stack hidden">
            <input id="questionId" type="hidden" />
            <div class="grid-2">
              <div class="field">
                <label for="categorySelect">Category</label>
                <select id="categorySelect" class="select"></select>
                <input id="categoryInput" class="input hidden" placeholder="Enter new category" />
              </div>
              <div class="field">
                <label for="questionInput">Question</label>
                <textarea id="questionInput" class="textarea" required></textarea>
              </div>
            </div>
            <div class="field">
              <label>Answers</label>
              <div id="answers" class="answers"></div>
              <div class="toolbar">
                <button type="button" id="addAnswerButton" class="btn btn-ghost">Add answer</button>
              </div>
            </div>
            <div class="toolbar">
              <button type="submit" class="btn btn-primary">Save changes</button>
              <button type="button" id="duplicateButton" class="btn btn-ghost">Duplicate as new</button>
              <button type="button" id="deleteButton" class="btn btn-danger">Delete</button>
              <button type="button" id="resetButton" class="btn btn-ghost">Reset</button>
            </div>
            <div id="status" class="status"></div>
          </form>
          <div id="emptyState" class="empty">Choose an item from the left or create a new record.</div>
        </div>
      </div>
    </main>
  </div>

  <script>
    const state = {
      all: [],
      filtered: [],
      selectedId: null,
      mode: 'edit',
      theme: matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light'
    };

    const el = {
      list: document.getElementById('list'),
      entryCount: document.getElementById('entryCount'),
      categoryCount: document.getElementById('categoryCount'),
      categoryFilter: document.getElementById('categoryFilter'),
      searchInput: document.getElementById('searchInput'),
      form: document.getElementById('questionForm'),
      emptyState: document.getElementById('emptyState'),
      formTitle: document.getElementById('formTitle'),
      questionId: document.getElementById('questionId'),
      categorySelect: document.getElementById('categorySelect'),
      categoryInput: document.getElementById('categoryInput'),
      questionInput: document.getElementById('questionInput'),
      answers: document.getElementById('answers'),
      status: document.getElementById('status'),
      newButton: document.getElementById('newButton'),
      addAnswerButton: document.getElementById('addAnswerButton'),
      deleteButton: document.getElementById('deleteButton'),
      resetButton: document.getElementById('resetButton'),
      duplicateButton: document.getElementById('duplicateButton'),
      themeToggle: document.getElementById('themeToggle'),
      downloadButton: document.getElementById('downloadButton'),
      dataFilePill: document.getElementById('dataFilePill')
    };

    document.documentElement.setAttribute('data-theme', state.theme);

    function setStatus(message = '', type = '') {
      el.status.textContent = message;
      el.status.className = `status ${type}`.trim();
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }

    function renderAnswers(values = ['']) {
      el.answers.innerHTML = '';
      values.forEach((value) => {
        const row = document.createElement('div');
        row.className = 'answer-row';
        row.innerHTML = `
          <input class="input answer-input" value="${escapeHtml(value)}" placeholder="Answer option" />
          <button type="button" class="btn btn-ghost remove-answer">Remove</button>
        `;
        row.querySelector('.remove-answer').addEventListener('click', () => {
          row.remove();
          if (!el.answers.children.length) renderAnswers(['']);
        });
        el.answers.appendChild(row);
      });
    }

    function getFormData() {
      return {
        id: el.questionId.value || undefined,
        category: (el.categorySelect.value === '__custom__' ? el.categoryInput.value : el.categorySelect.value).trim(),
        question: el.questionInput.value.trim(),
        answers: [...document.querySelectorAll('.answer-input')].map((input) => input.value.trim()).filter(Boolean)
      };
    }

    function fillForm(item, mode = 'edit') {
      state.mode = mode;
      state.selectedId = item?.id || null;
      el.form.classList.remove('hidden');
      el.emptyState.classList.add('hidden');
      el.questionId.value = item?.id || '';
      syncCategoryEditor(item?.category || '', mode);
      el.questionInput.value = item?.question || '';
      renderAnswers(item?.answers?.length ? item.answers : ['']);
      el.formTitle.textContent = mode === 'create' ? 'Add a new question' : 'Edit question';
      el.deleteButton.classList.toggle('hidden', mode === 'create');
      setStatus('');
    }

    function renderList() {
      const query = el.searchInput.value.trim().toLowerCase();
      const category = el.categoryFilter.value;
      state.filtered = state.all.filter((item) => {
        const matchesQuery = !query || item.question.toLowerCase().includes(query) || item.category.toLowerCase().includes(query);
        const matchesCategory = !category || item.category === category;
        return matchesQuery && matchesCategory;
      });

      el.list.innerHTML = '';
      if (!state.filtered.length) {
        el.list.innerHTML = '<div class="empty">No records match the current filters.</div>';
        return;
      }

      state.filtered.forEach((item) => {
        const button = document.createElement('button');
        button.className = `item ${item.id === state.selectedId ? 'active' : ''}`;
        button.innerHTML = `
          <h3>${escapeHtml(item.question)}</h3>
          <p>${escapeHtml(item.answers.join(' • '))}</p>
          <div class="item-meta">
            <span class="pill">${escapeHtml(item.category || 'Uncategorised')}</span>
            <span class="tiny">${item.answers.length} answers</span>
          </div>
        `;
        button.addEventListener('click', () => fillForm(item, 'edit'));
        el.list.appendChild(button);
      });
    }

    function syncCategoryEditor(currentCategory = '', mode = state.mode) {
      const categories = [...new Set(state.all.map((item) => item.category).filter(Boolean))].sort();
      const hasCurrent = currentCategory && categories.includes(currentCategory);
      const options = ['<option value="">Select category</option>']
        .concat(categories.map((category) => `<option value="${escapeHtml(category)}">${escapeHtml(category)}</option>`))
        .concat(['<option value="__custom__">+ New category</option>']);
      el.categorySelect.innerHTML = options.join('');

      if (mode === 'create') {
        if (hasCurrent) {
          el.categorySelect.value = currentCategory;
          el.categoryInput.classList.add('hidden');
          el.categoryInput.value = '';
        } else if (currentCategory) {
          el.categorySelect.value = '__custom__';
          el.categoryInput.classList.remove('hidden');
          el.categoryInput.value = currentCategory;
        } else {
          el.categorySelect.value = '';
          el.categoryInput.classList.add('hidden');
          el.categoryInput.value = '';
        }
      } else {
        if (hasCurrent) {
          el.categorySelect.value = currentCategory;
        } else if (currentCategory) {
          const extra = document.createElement('option');
          extra.value = currentCategory;
          extra.textContent = currentCategory;
          el.categorySelect.insertBefore(extra, el.categorySelect.lastElementChild);
          el.categorySelect.value = currentCategory;
        }
        el.categoryInput.classList.add('hidden');
        el.categoryInput.value = currentCategory;
      }
    }

    function renderFilters() {
      const categories = [...new Set(state.all.map((item) => item.category).filter(Boolean))].sort();
      el.categoryFilter.innerHTML = '<option value="">All categories</option>' + categories.map((category) => `<option value="${escapeHtml(category)}">${escapeHtml(category)}</option>`).join('');
      syncCategoryEditor(state.mode === 'edit' ? (state.all.find((item) => item.id === state.selectedId)?.category || '') : '', state.mode);
      el.entryCount.textContent = state.all.length;
      el.categoryCount.textContent = categories.length;
    }

    async function loadMeta() {
      const res = await fetch('/api/meta');
      const meta = await res.json();
      el.dataFilePill.textContent = `Data file: ${meta.dataFile}`;
    }

    async function loadQuestions(selectFirst = false) {
      setStatus('Loading data...');
      const res = await fetch('/api/questions');
      const data = await res.json();
      state.all = data;
      renderFilters();
      renderList();
      if (selectFirst && data.length) fillForm(data[0], 'edit');
      setStatus('Loaded questions.', 'success');
    }

    async function saveQuestion(event) {
      event.preventDefault();
      const payload = getFormData();
      if (!payload.category || !payload.question || !payload.answers.length) {
        setStatus('Category, question, and at least one answer are required.', 'error');
        return;
      }

      const isCreate = state.mode === 'create' || !payload.id;
      const url = isCreate ? '/api/questions' : `/api/questions/${payload.id}`;
      const method = isCreate ? 'POST' : 'PUT';
      setStatus('Saving...');

      const res = await fetch(url, {
        method,
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
      const body = res.status === 204 ? null : await res.json();
      if (!res.ok) {
        setStatus(body.errors ? body.errors.join(' ') : body.error || 'Save failed.', 'error');
        return;
      }
      await loadQuestions();
      fillForm(body, 'edit');
      setStatus('Saved successfully.', 'success');
    }

    async function deleteQuestion() {
      const id = el.questionId.value;
      if (!id) return;
      if (!confirm('Delete this question?')) return;
      const res = await fetch(`/api/questions/${id}`, { method: 'DELETE' });
      if (!res.ok) {
        const body = await res.json();
        setStatus(body.error || 'Delete failed.', 'error');
        return;
      }
      el.form.classList.add('hidden');
      el.emptyState.classList.remove('hidden');
      state.selectedId = null;
      await loadQuestions();
      setStatus('Question deleted.', 'success');
    }

    el.form.addEventListener('submit', saveQuestion);
    el.searchInput.addEventListener('input', renderList);
    el.categoryFilter.addEventListener('change', renderList);
    el.categorySelect.addEventListener('change', () => {
      const isCustom = el.categorySelect.value === '__custom__';
      el.categoryInput.classList.toggle('hidden', !isCustom);
      if (!isCustom) el.categoryInput.value = '';
      if (isCustom) el.categoryInput.focus();
    });
    el.newButton.addEventListener('click', () => fillForm({ category: '', question: '', answers: [''] }, 'create'));
    el.addAnswerButton.addEventListener('click', () => renderAnswers([...document.querySelectorAll('.answer-input')].map((input) => input.value), ''));
    el.deleteButton.addEventListener('click', deleteQuestion);
    el.resetButton.addEventListener('click', () => {
      if (state.mode === 'create') fillForm({ category: '', question: '', answers: [''] }, 'create');
      else {
        const item = state.all.find((q) => q.id === state.selectedId);
        if (item) fillForm(item, 'edit');
      }
    });
    el.duplicateButton.addEventListener('click', () => {
      const item = getFormData();
      fillForm({ ...item, id: '', question: item.question ? `${item.question} (copy)` : '' }, 'create');
      setStatus('Duplicated into a new draft.', 'success');
    });
    el.themeToggle.addEventListener('click', () => {
      state.theme = state.theme === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', state.theme);
    });

    el.downloadButton.addEventListener('click', () => {
      window.location.href = '/api/questions/download';
    });

    loadMeta();
    loadQuestions(true);
  </script>
</body>
</html>
